<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SplitSmart — Smart Expense Splitting</title>
  <meta name="description" content="Split expenses fairly with graph-based optimization. Minimize transactions, maximize fairness." />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/pages.css" />

  <!-- SockJS + STOMP for WebSocket -->
  <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
</head>
<body>

<div class="auth-container">
  <!-- Left panel: animated graph illustration -->
  <div class="auth-left">
    <svg class="auth-bg-graph" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0,0 L0,6 L6,3 z" fill="#7c3aed" opacity="0.6"/>
        </marker>
      </defs>
      <!-- Nodes -->
      <circle class="node-anim" cx="250" cy="120" r="28" fill="#7c3aed" opacity="0.8"/>
      <circle class="node-anim" cx="100" cy="280" r="28" fill="#06b6d4" opacity="0.8"/>
      <circle class="node-anim" cx="400" cy="280" r="28" fill="#10b981" opacity="0.8"/>
      <circle class="node-anim" cx="160" cy="420" r="22" fill="#f59e0b" opacity="0.8"/>
      <circle class="node-anim" cx="340" cy="420" r="22" fill="#ef4444" opacity="0.8"/>
      <!-- Edges -->
      <line x1="250" y1="148" x2="115" y2="258" stroke="#7c3aed" stroke-width="1.5" opacity="0.4" marker-end="url(#arrow)"/>
      <line x1="250" y1="148" x2="385" y2="258" stroke="#7c3aed" stroke-width="1.5" opacity="0.4" marker-end="url(#arrow)"/>
      <line x1="115" y1="295" x2="330" y2="275" stroke="#06b6d4" stroke-width="1.5" opacity="0.4" marker-end="url(#arrow)"/>
      <line x1="115" y1="302" x2="150" y2="400" stroke="#06b6d4" stroke-width="1.5" opacity="0.4" marker-end="url(#arrow)"/>
      <line x1="385" y1="302" x2="350" y2="400" stroke="#10b981" stroke-width="1.5" opacity="0.4" marker-end="url(#arrow)"/>
      <line x1="175" y1="425" x2="318" y2="425" stroke="#f59e0b" stroke-width="1.5" opacity="0.4" marker-end="url(#arrow)"/>
      <!-- Labels -->
      <text x="250" y="124" text-anchor="middle" fill="white" font-size="11" font-weight="700" font-family="Inter">A</text>
      <text x="100" y="284" text-anchor="middle" fill="white" font-size="11" font-weight="700" font-family="Inter">B</text>
      <text x="400" y="284" text-anchor="middle" fill="white" font-size="11" font-weight="700" font-family="Inter">C</text>
      <text x="160" y="424" text-anchor="middle" fill="white" font-size="10" font-weight="700" font-family="Inter">D</text>
      <text x="340" y="424" text-anchor="middle" fill="white" font-size="10" font-weight="700" font-family="Inter">E</text>
    </svg>

    <div class="auth-left-content animate-in">
      <div class="auth-tagline">
        Split smarter,<br><span>settle faster.</span>
      </div>
      <p class="auth-subtitle">
        The graph-based expense app that minimizes transactions to the absolute minimum.
        Add bills, split fairly, settle once.
      </p>
      <div class="auth-stats">
        <div class="auth-stat">
          <div class="auth-stat-num">N-1</div>
          <div class="auth-stat-label">Max Transactions</div>
        </div>
        <div class="auth-stat">
          <div class="auth-stat-num">100%</div>
          <div class="auth-stat-label">Real-time sync</div>
        </div>
        <div class="auth-stat">
          <div class="auth-stat-num">3</div>
          <div class="auth-stat-label">Split types</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right panel: auth form -->
  <div class="auth-right">
    <div class="auth-form-box fade-in">
      <div class="brand" style="margin-bottom: 32px; justify-content: center;">
        <div class="brand-icon">💸</div>
        <span>SplitSmart</span>
      </div>

      <!-- Tab switch -->
      <div class="tabs" style="margin-bottom: 28px;">
        <button class="tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
        <button class="tab" id="tab-register" onclick="switchTab('register')">Create Account</button>
      </div>

      <!-- Login Form -->
      <form class="auth-form" id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="login-email">Email</label>
          <div class="input-with-icon">
            <span class="input-icon">✉️</span>
            <input class="form-input" id="login-email" type="email" placeholder="you@example.com" required />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="login-password">Password</label>
          <div class="input-with-icon">
            <span class="input-icon">🔒</span>
            <input class="form-input" id="login-password" type="password" placeholder="••••••••" required />
          </div>
        </div>
        <div id="login-error" class="form-error" style="display:none;"></div>
        <button class="btn btn-primary btn-lg w-full" id="login-btn" type="submit">
          <span class="btn-text">Sign In</span>
        </button>
        <div class="auth-switch">
          Don't have an account?
          <a href="#" onclick="switchTab('register'); return false;">Create one</a>
        </div>
      </form>

      <!-- Register Form -->
      <form class="auth-form" id="register-form" style="display:none;" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label" for="reg-name">Full Name</label>
          <div class="input-with-icon">
            <span class="input-icon">👤</span>
            <input class="form-input" id="reg-name" type="text" placeholder="Arjun Sharma" required />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-email">Email</label>
          <div class="input-with-icon">
            <span class="input-icon">✉️</span>
            <input class="form-input" id="reg-email" type="email" placeholder="you@example.com" required />
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="reg-password">Password</label>
          <div class="input-with-icon">
            <span class="input-icon">🔒</span>
            <input class="form-input" id="reg-password" type="password" placeholder="Min. 6 characters" required minlength="6" />
          </div>
        </div>
        <div id="reg-error" class="form-error" style="display:none;"></div>
        <button class="btn btn-primary btn-lg w-full" id="register-btn" type="submit">
          <span class="btn-text">Create Account</span>
        </button>
        <div class="auth-switch">
          Already have an account?
          <a href="#" onclick="switchTab('login'); return false;">Sign in</a>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>

<style>
  .node-anim { animation: pulse 3s ease-in-out infinite; }
  .node-anim:nth-child(2) { animation-delay: 0.5s; }
  .node-anim:nth-child(3) { animation-delay: 1s; }
  .node-anim:nth-child(4) { animation-delay: 1.5s; }
  .node-anim:nth-child(5) { animation-delay: 2s; }
  @keyframes pulse { 0%,100%{opacity:.8;} 50%{opacity:0.4;} }
</style>

</body>
</html>
