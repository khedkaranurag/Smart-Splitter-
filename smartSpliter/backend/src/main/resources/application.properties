spring.application.name=splitsmart

# ─── Database (MySQL) ─────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/splitsmart?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=true

# ─── JWT ─────────────────────────────────────────────────────────────────────
# IMPORTANT: Change this to a strong random secret in production (min 256 bits)
jwt.secret=splitsmart-super-secret-jwt-signing-key-must-be-at-least-256-bits-long
jwt.expiration=86400000

# ─── Server ──────────────────────────────────────────────────────────────────
server.port=8080

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.splitsmart=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=WARN

# --- Mock SMTP Config ---------------------------------------------------------
spring.mail.host=mock
spring.mail.port=1025
spring.mail.username=mock
spring.mail.password=mock
